{% extends "base.html" %}
{% block title %}Sipari횇타 Talebi{% endblock %}
{% block page_title %}Yeni Sipari횇타 Talebi{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-xl-8">
    <div class="card p-4">
      <p class="text-muted">횆째stedi횆타iniz 횄쩌r횄쩌nleri ve adetleri girin. Y횄쨋netici onaylad횆짹ktan sonra sevk edilecek.</p>
      <form method="POST">
        <div id="urunContainer"></div>
        <button type="button" class="btn btn-outline-primary mb-3" onclick="urunEkle()">
          <i class="bi bi-plus"></i> 횄흹r횄쩌n Ekle
        </button>
        <div class="mb-3">
          <label class="form-label">Not / A횄짠횆짹klama</label>
          <textarea name="notlar" class="form-control" rows="2" placeholder="Ek bilgi varsa yaz횆짹n..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary px-4"><i class="bi bi-send me-1"></i>Talep G횄쨋nder</button>
        <a href="{{ url_for('magaza.dashboard') }}" class="btn btn-secondary ms-2">횆째ptal</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
const urunler = [
  {% for u in urunler %}{"id":{{ u.id }},"ad":"{{ u.ad }}"},{% endfor %}
];

function urunEkle() {
  const c = document.getElementById("urunContainer");
  const div = document.createElement("div");
  div.className = "row g-2 mb-2 align-items-center";
  let opts = '<option value="">-- 횄흹r횄쩌n Se횄짠in --</option>';
  urunler.forEach(u => opts += `<option value="${u.id}">${u.ad}</option>`);
  div.innerHTML = `
    <div class="col-8"><select name="urun_id[]" class="form-select" required>${opts}</select></div>
    <div class="col-3"><input type="number" name="miktar[]" class="form-control" placeholder="Adet" min="1" required></div>
    <div class="col-1"><button type="button" class="btn btn-outline-danger" onclick="this.closest('.row').remove()"><i class="bi bi-x"></i></button></div>
  `;
  c.appendChild(div);
}

urunEkle();
</script>
{% endblock %}
