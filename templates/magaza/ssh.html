{% block scripts %}
<script>
const urunSelect = document.getElementById('urunSelect');
const paketSelect = document.getElementById('paketSelect');
const paketYukleniyor = document.getElementById('paketYukleniyor');

urunSelect.addEventListener('change', function () {
  const urunId = this.value;
  paketSelect.innerHTML = '<option value="">â€” Paket seÃ§in â€”</option>';
  paketSelect.disabled = true;

  if (!urunId) return;

  paketYukleniyor.style.display = '';
  fetch(`/m/api/urun-paketleri/${urunId}`)
    .then(r => r.json())
    .then(data => {
      paketYukleniyor.style.display = 'none';
      if (data && data.length > 0) {
        data.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p.id;
          opt.textContent = p.paket_adi;
          paketSelect.appendChild(opt);
        });
        paketSelect.disabled = false;
      } else {
        paketSelect.innerHTML = '<option value="">Bu Ã¼rÃ¼ne ait paket yok</option>';
      }
    })
    .catch(() => {
      paketYukleniyor.style.display = 'none';
      paketSelect.innerHTML = '<option value="">YÃ¼klenemedi, tekrar deneyin</option>';
    });
});

document.getElementById('btnSifirla').addEventListener('click', () => {
  paketSelect.innerHTML = '<option value="">â€” Ã–nce Ã¼rÃ¼n seÃ§in â€”</option>';
  paketSelect.disabled = true;
});
</script>
