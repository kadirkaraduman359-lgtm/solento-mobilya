<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Giriş – Solento Mobilya</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    body {
      background: linear-gradient(135deg, #1a1f2e 0%, #2d3550 60%, #4f6df5 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .login-card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      width: 100%; max-width: 420px; padding: 2.5rem 2rem;
    }
    .brand-section { text-align: center; margin-bottom: 1.75rem; }
    .brand-icon {
      width: 60px; height: 60px; background: #4f6df5; border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      color: #fff; font-size: 1.75rem; margin-bottom: .75rem;
    }
    .brand-section h1 { font-size: 1.5rem; font-weight: 700; color: #1a1f2e; margin-bottom: .1rem; }
    .brand-section p { color: #7b8ab8; font-size: .85rem; margin: 0; }
    .nav-tabs .nav-link { color: #7b8ab8; font-weight: 500; }
    .nav-tabs .nav-link.active { color: #4f6df5; font-weight: 700; }
    .btn-primary { background: #4f6df5; border-color: #4f6df5; }
    .btn-primary:hover { background: #3a56d4; border-color: #3a56d4; }
    .form-control:focus { border-color: #4f6df5; box-shadow: 0 0 0 .2rem rgba(79,109,245,.2); }
  </style>
</head>
<body>
<div class="login-card">
  <div class="brand-section">
    <div class="brand-icon"><i class="bi bi-box-seam"></i></div>
    <h1>Solento Mobilya</h1>
    <p>Yönetim &amp; Mağaza Paneli</p>
  </div>

  <!-- Flash messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ 'success' if category == 'success' else ('danger' if category in ('error','danger') else category) }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  <!-- Tabs -->
  <ul class="nav nav-tabs mb-3" id="loginTabs" role="tablist">
    <li class="nav-item flex-fill" role="presentation">
      <button class="nav-link w-100 {% if not request.args.get('tab') or request.args.get('tab') == 'admin' %}active{% endif %}"
              id="admin-tab" data-bs-toggle="tab" data-bs-target="#admin-pane" type="button" role="tab">
        <i class="bi bi-shield-lock me-1"></i>Yönetici
      </button>
    </li>
    <li class="nav-item flex-fill" role="presentation">
      <button class="nav-link w-100 {% if request.args.get('tab') == 'magaza' %}active{% endif %}"
              id="magaza-tab" data-bs-toggle="tab" data-bs-target="#magaza-pane" type="button" role="tab">
        <i class="bi bi-shop me-1"></i>Mağaza
      </button>
    </li>
  </ul>

  <div class="tab-content">
    <!-- Admin pane -->
    <div class="tab-pane fade {% if not request.args.get('tab') or request.args.get('tab') == 'admin' %}show active{% endif %}"
         id="admin-pane" role="tabpanel">
      <form method="POST" action="{{ url_for('auth.login') }}">
        <input type="hidden" name="rol" value="admin"/>
        <div class="mb-3">
          <label class="form-label fw-semibold" for="admin_email">E-posta</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" id="admin_email" name="email" placeholder="admin@solento.com" required autocomplete="email"/>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold" for="admin_password">Şifre</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="admin_password" name="password" placeholder="••••••••" required autocomplete="current-password"/>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 mt-1 py-2 fw-semibold">
          <i class="bi bi-box-arrow-in-right me-2"></i>Yönetici Girişi
        </button>
      </form>
    </div>

    <!-- Mağaza pane -->
    <div class="tab-pane fade {% if request.args.get('tab') == 'magaza' %}show active{% endif %}"
         id="magaza-pane" role="tabpanel">
      <form method="POST" action="{{ url_for('auth.login') }}">
        <input type="hidden" name="rol" value="magaza"/>
        <div class="mb-3">
          <label class="form-label fw-semibold" for="magaza_email">E-posta</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" id="magaza_email" name="email" placeholder="magaza@solento.com" required autocomplete="email"/>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold" for="magaza_password">Şifre</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="magaza_password" name="password" placeholder="••••••••" required autocomplete="current-password"/>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 mt-1 py-2 fw-semibold">
          <i class="bi bi-box-arrow-in-right me-2"></i>Mağaza Girişi
        </button>
      </form>
      <hr class="my-3"/>
      <p class="text-center text-muted" style="font-size:.82rem;">
        Hesabınız yok mu?
        <a href="{{ url_for('auth.register') }}" class="text-decoration-none fw-semibold">Kayıt Ol</a>
      </p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
